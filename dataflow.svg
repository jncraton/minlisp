<svg width="400" height="800" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg">
  <style>
    * { font-family:monospace; font-size:24px; }
    text { fill:black; text-anchor:middle; }
    rect { fill:none; stroke:black; stroke-width:4; }
    path { stroke:black; stroke-width:4; fill:none; }
    polygon { fill:black; stroke:none; }
  </style>

  <rect x="30" y="20" width="340" height="60" />
  <text x="200" y="55">Source String</text>

  <path d="M 200 80 V 120" />
  <polygon points="195 110, 205 110, 200 120" />

  <rect x="20" y="120" width="360" height="300" />
  <text x="30" y="145" style="text-anchor: start;">"Parser"</text>

  <rect x="40" y="160" width="320" height="60" />
  <text x="200" y="188">Lexical Analysis</text>
  <text x="200" y="210">(Create Tokens)</text>

  <path d="M 200 220 V 250" />
  <polygon points="195 240, 205 240, 200 250" />

  <rect x="100" y="250" width="200" height="60" />
  <text x="200" y="285">Tokens</text>

  <path d="M 200 310 V 340" />
  <polygon points="195 330, 205 330, 200 340" />

  <rect x="40" y="340" width="320" height="60" />
  <text x="200" y="368">Syntactic Analysis</text>
  <text x="200" y="390">(Create Tree)</text>

  <path d="M 200 420 V 460" />
  <polygon points="195 450, 205 450, 200 460" />

  <rect x="100" y="460" width="200" height="60" />
  <text x="200" y="495">Parse Tree</text>

  <path d="M 200 520 V 560" />
  <polygon points="195 550, 205 550, 200 560" />

  <rect x="20" y="560" width="360" height="100" />
  <text x="200" y="595">Compiler, Interpreter</text>
  <text x="200" y="625">or Translator</text>

  <path d="M 200 660 V 700" />
  <polygon points="195 690, 205 690, 200 700" />

  <rect x="100" y="700" width="200" height="60" />
  <text x="200" y="735">Output</text>
</svg>
